<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediSphere Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
margin:0;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:#1d2b53;
position:fixed;
color:white;
padding-top:30px;
}

.sidebar h3{
text-align:center;
margin-bottom:40px;
}

.menu{
padding:12px 20px;
cursor:pointer;
color:#ddd;
transition:0.3s;
}

.menu:hover{
background:#111d40;
color:white;
}

/* CONTENT */

.content{
margin-left:260px;
padding:40px;
}

.card{
border-radius:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border:none;
}

.page{
display:none;
}

.active{
display:block;
}
/* DOCTOR CARD FIX */

#doctorContainer .col-md-4{
display:flex;
}

#doctorContainer .card{
width:100%;
height:100%;
display:flex;
flex-direction:column;
}

#doctorContainer .card img{
height:200px;
object-fit:cover;
}

#doctorContainer .card h4{
font-size:20px;
margin-top:10px;
}

#doctorContainer .card p{
margin:2px 0;
flex-grow:1;
}
.slot-pill{
background:#1d2b53;
color:white;
padding:8px 12px;
border-radius:20px;
display:inline-block;
margin:6px;
}

.removeSlot{
margin-left:10px;
cursor:pointer;
color:red;
font-weight:bold;
}
.user-card {
    border-radius: 12px;
    background: white;
    border: none;
}
/* LAB TEST BOOKING CARDS */
.lab-card {
    border: none;
    border-radius: 14px;
    padding: 20px;
    background: #ffffff;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    transition: 0.3s;

    height: 100%;  
    width:100%;            /* FIX 1: equal height */
    display: flex;             /* FIX 2 */
    flex-direction: column;    /* FIX 3 */
    justify-content: space-between;
}

.lab-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

/* Test Title */
.lab-title {
    font-size: 20px;
    font-weight: 600;
    color: #1d2b53;
    margin-bottom: 10px;
}
#labtestContainer .col-md-4 {
    display: flex;
}

#labtestContainer .lab-card {
    flex: 1;
}

/* Info lines */
.lab-info {
    font-size: 14px;
    margin: 4px 0;
    color: #444;
}

/* Label bold */
.lab-info strong {
    color: #000;
}

/* Prescription button */
.prescription-btn {
    background: #1d2b53;
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 13px;
    display: inline-block;
    margin-top: 6px;
    transition: 0.3s;
}

.prescription-btn:hover {
    background: #111d40;
}

/* Date and footer text */
.lab-date {
    font-size: 13px;
    color: #666;
    margin-top: 10px;
}
</style>
</head>

<div id="labtestPage" class="page">

</div>

<script>
    

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

<!-- SUPABASE SCRIPT -->

<script type="module">

import { supabase } from "./js/supabase.js";
function toDBDate(dateStr) {
    // If format already YYYY-MM-DD, return as is
    if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
        return dateStr;
    }

    // If accidentally DD-MM-YYYY came
    if (dateStr.includes("-")) {
        const [day, month, year] = dateStr.split("-");
        return `${year}-${month}-${day}`;
    }

    // If natural date (Mar 17 2024)
    const d = new Date(dateStr);
    return d.toISOString().split("T")[0];
}



  /* LOAD USERS */
 async function loadUsers() {
    const { data, error } = await supabase
        .from("users")
        .select("*");

    const container = document.getElementById("usersContainer");
    container.innerHTML = "";

    data.forEach(user => {
        container.innerHTML += `
            <div class="col-md-4">
                <div class="card p-3 user-card shadow-sm mb-4">

                    <h5 class="mb-2">👤 ${user.name || "No Name"}</h5>

                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>Phone:</strong> ${user.phone || "Not Provided"}</p>

                    <p><strong>Joined:</strong> 
                        ${new Date(user.created_at).toLocaleDateString()}
                    </p>

                </div>
            </div>
        `;
    });
}
/* LOAD DOCTORS */
async function loadDoctors(){

const { data, error } = await supabase
.from("doctors")
.select("*")
.eq("is_deleted", false)
if(error){
console.log(error)
return
}

const container = document.getElementById("doctorContainer")
container.innerHTML=""

if(data){
data.forEach(doc=>{

container.innerHTML += `

<div class="col-md-4 mb-4">

<div class="card doctor-card p-3">

<img src="${doc.photo}" class="doctor-img">

<div>

<h5 class="mt-2">${doc.name}</h5>

<p class="text-muted mb-1">${doc.specialization}</p>
<p class="text-muted mb-1">${doc.email}</p>
<p class="text-muted mb-1">${doc.about}</p>


<p class="mb-1">Experience : ${doc.experience}</p>
<p class="mb-1">⭐ Rating : ${doc.rating || "N/A"}</p>
<p class="mb-1">👥 Patients : ${doc.patients || "0"}</p>
<p>Fees : ₹${doc.fees}</p>

</div>

<div class="card-buttons">
<button class="btn btn-warning btn-sm"
onclick="editDoctor('${doc.id}')">
Edit Profile
</button>

<button class="btn btn-dark btn-sm"
onclick="openSlotManager('${doc.id}','${doc.name}')">
Manage Slots
</button>

<button class="btn btn-danger btn-sm"
onclick="deleteDoctor('${doc.id}')">
Delete Profile
</button>

</div>

</div>

</div>

`

})
}

}loadDoctors()

/* ADD DOCTOR */

document.getElementById("addDoctorBtn").addEventListener("click", async()=>{

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let spec=document.getElementById("spec").value
let exp=document.getElementById("exp").value
let fees=document.getElementById("fees").value
let about=document.getElementById("about").value
let rating = document.getElementById("rating").value;
let patients = document.getElementById("patients").value;
let file=document.getElementById("photo").files[0]

if(!name || !email || !spec || !exp || !fees || !about || !file || !rating || !patients){

alert("Fill all fields")
return

}



/* IMAGE UPLOAD */

let fileName = Date.now() + "_" + file.name;

let { error: uploadError } = await supabase.storage
.from("doctors")
.upload("profiles/" + fileName, file);

if(uploadError){
console.log(uploadError)
alert("Image upload failed")
return
}

/* GET PUBLIC URL */

let { data:urlData } = supabase.storage
.from("doctors")
.getPublicUrl("profiles/" + fileName);

let imageURL = urlData.publicUrl;
/* INSERT DOCTOR */

let {error}=await supabase
.from("doctors")
.insert([{
name:name,
email:email,
specialization:spec,
experience:exp,
fees:fees,
rating: parseFloat(rating),
patients: parseInt(patients),
about:about,
photo:imageURL
}])


if(error){

alert("Doctor add failed")
console.log(error)
return

}

alert("Doctor Added Successfully")

location.reload()

})
/* FETCHING EXISTING DATA OF DOCTORS FOR EDITING */

let doctorId = null;

window.editDoctor = async function(id){

doctorId = id;

showPage("editprofile");

const { data } = await supabase
.from("doctors")
.select("*")
.eq("id", id)
.single()

document.getElementById("editName").value = data.name
document.getElementById("editMail").value = data.email
document.getElementById("editSpec").value = data.specialization
document.getElementById("editExp").value = data.experience
document.getElementById("editFees").value = data.fees
document.getElementById("editabout").value = data.about
document.getElementById("editRating").value = data.rating || 0;
document.getElementById("editPatients").value = data.patients || 0;
document.getElementById("editImg").value = data.photo

}


/* UPDATE OR EDIT DOCTOR */

window.updateDoctor = async function(){

const name = document.getElementById("editName").value
const email = document.getElementById("editMail").value
const specialization = document.getElementById("editSpec").value
const experience = document.getElementById("editExp").value
const fees = document.getElementById("editFees").value
const rating = document.getElementById("editRating").value;
const patients = document.getElementById("editPatients").value;
const about = document.getElementById("editabout").value
const photo = document.getElementById("editImg").value

const { error } = await supabase
.from("doctors")
.update({
name:name,
email:email,
specialization:specialization,
experience:experience,
fees:fees,
rating: parseFloat(rating),
patients: parseInt(patients),
about:about,
photo:photo
})
.eq("id", doctorId)

if(error){
alert("Update failed")
return
}

alert("Profile updated successfully")

showPage("doctorList")

loadDoctors()

}
/* MANAGING SLOTS */
let currentDoctor = null;
let slots = [];

/* OPEN SLOT PAGE */

window.openSlotManager = async function(id,name){

    currentDoctor = id;

    showPage("slotsPage");

    document.getElementById("slotDate").min =
        new Date().toISOString().split("T")[0];

    document.getElementById("slotDoctorName").innerText =
        "Slots for Dr. " + name;

    const { data, error } = await supabase
        .from("slots")
        .select("*")
        .eq("doctor_id", id);

    slots = data || [];

    normalizeSlots();  // 👈 THIS FIXES THE BUG

    renderSlots();
}

/* ADD SLOT */
window.addSlot = function () {
    const dateInput = document.getElementById("slotDate").value;
    const timeInput = document.getElementById("slotTime").value;

    if (!dateInput || !timeInput) {
        alert("Please select date and time");
        return;
    }

    // Convert YYYY-MM-DD safely
    const selectedDate = new Date(dateInput + "T00:00:00");

    // Normalize today's date
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // ❌ Block past dates
    if (selectedDate.getTime() < today.getTime()) {
        alert("❌ Invalid Date! Please select a future date.");
        return;
    }

    // ❌ Prevent duplicate slot (Both DB + new slots)
    const duplicate = slots.find(s => {
        const dbDate = (s.slot_date || s.date);
        const dbTime = (s.slot_time || s.time);
        return dbDate === dateInput && dbTime === timeInput;
    });

    if (duplicate) {
        alert("❌ This slot already exists!");
        return;
    }

    // Push NEW slot
    slots.push({
        date: dateInput,
        time: timeInput
    });

    renderSlots();
};
function normalizeSlots() {
    slots = slots.map(s => ({
        id: s.id || null,
        date: s.slot_date || s.date,
        time: s.slot_time || s.time
    }));
}
/* SHOW SLOTS */

function renderSlots(){

let container = document.getElementById("slotContainer")

container.innerHTML=""

slots.forEach((slot,index)=>{

let date = slot.slot_date || slot.date
let time = slot.slot_time || slot.time

container.innerHTML += `
<span class="slot-pill">
${date} ${time}
<span class="removeSlot"
onclick="deleteSlot('${slot.id || index}')">
✖
</span>
</span>
`

})

}

/* REMOVE SLOT */

window.deleteSlot = async function(id){

if(!confirm("Delete this slot?")) return

const { error } = await supabase
.from("slots")
.delete()
.eq("id", id)

if(error){
alert("Delete failed")
return
}

alert("Slot deleted")

openSlotManager(currentDoctor,"")

}

/* SAVE SLOTS */
window.saveSlots = async function() {

    for (let slot of slots) {

        await supabase
            .from("slots")
            .insert([
                {
                    doctor_id: currentDoctor,
                    slot_date: toDBDate(slot.date),
                    slot_time: slot.time
                }
            ]);
    }

    alert("Slots saved successfully");
}


/* DELETE DOCTOR */
window.deleteDoctor = async function(id){

if(!confirm("Are you sure you want to delete this doctor?")) return

const { error } = await supabase
.from("doctors")
.update({ is_deleted: true })
.eq("id", id)

if(error){
console.log(error)
alert("Soft delete failed")
return
}

alert("Doctor deleted successfully (soft delete)")

loadDoctors()

}

/* LOAD USERS */
const userMenu = document.querySelector('.menu[onclick="showPage(\'userListPage\')"]');

userMenu.onclick = () => {
    showPage("userListPage");
    loadUsers();
};


/* MENU CLICK PAR LABTEST PAGE LOAD KRANA */
const labTestMenu = document.querySelector('.menu[onclick="showPage(\'labtestPage\')"]');

labTestMenu.onclick = () => {
    showPage("labtestPage");
    loadLabTests();
};


/* LOAD LAB TEST BOOKINGS */
async function loadLabTests() {

    const container = document.getElementById("labtestContainer");
    container.innerHTML = "<p>Loading...</p>";

    const { data, error } = await supabase
        .from("labtestbookings")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.log(error);
        container.innerHTML = "<p>Error loading lab tests</p>";
        return;
    }

    container.innerHTML = "";

    data.forEach(test => {

        let status = test.status || "pending";

        container.innerHTML += `
        <div class="col-md-4 d-flex">
            <div class="lab-card">

                <div class="lab-title">🧪 ${test.test}</div>

                <p class="lab-info"><strong>Patient:</strong> ${test.name}</p>
                <p class="lab-info"><strong>Phone:</strong> ${test.phone}</p>
                <p class="lab-info"><strong>Email:</strong> ${test.email || "N/A"}</p>

                <p class="lab-info"><strong>Preferred Date:</strong> 
                    ${test.preferreddate 
                        ? new Date(test.preferreddate).toLocaleDateString() 
                        : "N/A"}
                </p>

                <p class="lab-info"><strong>Collection:</strong> ${test.collection_type}</p>

                <p class="lab-info"><strong>Time Slot:</strong> 
                    ${test.time_slot ? test.time_slot : "No Slot Selected"}
                </p>

                <p class="lab-info"><strong>Address:</strong> ${test.address || "N/A"}</p>

                <p class="lab-info"><strong>Prescription:</strong><br>
                    ${
                        test.prescription
                            ? `<a href="${test.prescription}" target="_blank" class="prescription-btn">View Prescription</a>`
                            : "No File Uploaded"
                    }
                </p>

                <p class="lab-info">
                    <strong>Status:</strong>
                    <span class="badge ${status === "completed" ? "bg-success" : "bg-warning"}">
                        ${status.toUpperCase()}
                    </span>
                </p>

                ${
                    status === "pending"
                    ? `
                        <button class="btn btn-success btn-sm w-100"
                            onclick="markLabTestCompleted('${test.id}')">
                            Mark as Completed
                        </button>
                    `
                    : `
                        <button class="btn btn-danger btn-sm w-100"
                            onclick="deleteLabTest('${test.id}')">
                            Delete Lab Test
                        </button>
                    `
                }

                <div class="lab-date mt-2">
                    <strong>Booked On:</strong> 
                    ${new Date(test.created_at).toLocaleDateString()}
                </div>

            </div>
        </div>
        `;
    });
}
// MARK LAB TEST COMPLETED
window.markLabTestCompleted = async function(id) {

    const { error } = await supabase
        .from("labtestbookings")
        .update({ status: "completed" })
        .eq("id", id);

    if (error) {
        console.log(error);
        alert("Error updating lab test status");
        return;
    }

    alert("Lab Test marked as Completed!");
    loadLabTests();
};
// DELETE LAB TEST
window.deleteLabTest = async function(id) {

    if (!confirm("Are you sure you want to delete this lab test booking?")) return;

    const { error } = await supabase
        .from("labtestbookings")
        .delete()
        .eq("id", id);

    if (error) {
        console.log(error);
        alert("Error deleting lab test booking");
        return;
    }

    alert("Lab Test booking deleted successfully!");
    loadLabTests();
};
// LOAD APPOINTMENTS
window.loadAppointments = async function () {

    const container = document.getElementById("appointmentList");
    container.innerHTML = "<p>Loading...</p>";

    const { data, error } = await supabase
        .from("appointments")
        .select(`
            *,
            doctors ( name )
        `)
        .order("created_at", { ascending: false });

    if (error) {
        console.log(error);
        container.innerHTML = "<p>Error loading appointments</p>";
        return;
    }

    container.innerHTML = "";

    data.forEach(app => {

        let status = app.status || "pending";

        container.innerHTML += `
        <div class="col-md-4 col-sm-6 col-12 d-flex">
            <div class="lab-card">

                <div class="lab-title">📅 Appointment</div>

                <p class="lab-info"><strong>Patient:</strong> ${app.patientname}</p>
                <p class="lab-info"><strong>Doctor:</strong> ${app.doctors?.name || "N/A"}</p>

                <p class="lab-info"><strong>Phone:</strong> ${app.phone}</p>

                <p class="lab-info"><strong>Email:</strong> ${app.patientemail}</p>

                <p class="lab-info"><strong>Date:</strong>
                    ${new Date(app.appointmentdate).toLocaleDateString()}
                </p>

                <p class="lab-info"><strong>Time:</strong> ${app.appointmenttime}</p>

                <p class="lab-info">
                    <strong>Status:</strong>
                    <span class="badge ${status === "completed" ? "bg-success" : "bg-warning"}">
                        ${status.toUpperCase()}
                    </span>
                </p>
                <p class="lab-info"><strong>Type:</strong> ${app.appointment_type || "offline"}</p>

${
  app.meet_link 
  ? `<a href="${app.meet_link}" target="_blank" class="prescription-btn">Join Meet</a>`
  : ""
}

                ${
                    status === "pending" 
                    ? `
                    <button class="btn btn-success btn-sm w-100" onclick="markCompleted('${app.id}')">
                        Mark as Completed
                    </button>
                    `
                    : `
                    <button class="btn btn-danger btn-sm w-100" onclick="deleteAppointment('${app.id}')">
                        Delete Appointment
                    </button>
                    `
                }

            </div>
        </div>
        `;
    });
}

// MARK COMPLETED APPOINTMENTS
window.markCompleted = async function(id) {

    // 1) Update DB first
    const { data, error } = await supabase
        .from("appointments")
        .update({ status: "completed" })
        .eq("id", id);

    if (error) {
        console.log(error);
        alert("Error updating status");
        return;
    }

    // 2) UI ko turant refresh karo
    loadAppointments();
};
// DELETE APPOINTMENTS
window.deleteAppointment = async function(id) {

    if (!confirm("Are you sure?")) return;

    const { data, error } = await supabase
        .from("appointments")
        .delete()
        .match({ id: id }); // <-- FIX

    console.log("DELETE ERROR:", error);

    if (error) {
        alert("Supabase delete error — check console");
        return;
    }

    alert("Appointment deleted");
    loadAppointments();
};
</script>
