<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediSphere Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
margin:0;
}

/* SIDEBAR */

.sidebar{
width:240px;
height:100vh;
background:#1d2b53;
position:fixed;
color:white;
padding-top:30px;
}

.sidebar h3{
text-align:center;
margin-bottom:40px;
}

.menu{
padding:12px 20px;
cursor:pointer;
color:#ddd;
transition:0.3s;
}

.menu:hover{
background:#111d40;
color:white;
}

/* CONTENT */

.content{
margin-left:260px;
padding:40px;
}

.card{
border-radius:12px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
border:none;
}

.page{
display:none;
}

.active{
display:block;
}
/* DOCTOR CARD FIX */

#doctorContainer .col-md-4{
display:flex;
}

#doctorContainer .card{
width:100%;
height:100%;
display:flex;
flex-direction:column;
}

#doctorContainer .card img{
height:200px;
object-fit:cover;
}

#doctorContainer .card h4{
font-size:20px;
margin-top:10px;
}

#doctorContainer .card p{
margin:2px 0;
flex-grow:1;
}
</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>MediSphere</h3>

<div class="menu" onclick="showPage('addDoctor')">
➕ Add Doctor
</div>

<div class="menu" onclick="showPage('doctorList')">
👨‍⚕️ Doctors List
</div>
<div class="menu" onclick="showPage('editprofile')">
👨Edit Profile
</div>


</div>


<!-- CONTENT -->

<div class="content">

<!-- ADD DOCTOR -->

<div id="addDoctor" class="page active">

<h2>Add Doctor Profile</h2>

<div class="card p-4 mt-3">

<label>Name</label>
<input id="name" class="form-control mb-2">

<label>Email</label>
<input id="email" class="form-control mb-2">

<label>Specialization</label>
<input id="spec" class="form-control mb-2">

<label>Experience</label>
<input id="exp" class="form-control mb-2">

<label>Fees</label>
<input id="fees" class="form-control mb-2">

<label>Doctor Image</label>
<input type="file" id="photo" class="form-control mb-3">

<button class="btn btn-primary w-100" id="addDoctorBtn">
Save Doctor
</button>

</div>
</div>

<!-- EDIT PROFILE -->
 <div id="editprofile" class="page">
            <h2>Edit Doctor Profile</h2>

            <div class="card mt-3">
                <label>Name:</label>
                <input id="editName" class="form-control mb-2">
       
                 <label>Email</label>
                <input id="editMail" class="form-control mb-2">

                <label>Specialisation:</label>
                <input id="editSpec" class="form-control mb-2">

                <label>Experience:</label>
                <input id="editExp" class="form-control mb-2">

                <label>Fees:</label>
                <input id="editFees" class="form-control mb-2">

                <label>Image URL:</label>
                <input id="editImg" class="form-control mb-2">

                <button onclick="updateDoctor()" class="btn btn-primary w-100 mt-3">Update Profile</button>
            </div>
        </div>

<!-- DOCTOR LIST -->

<div id="doctorList" class="page">

<h2>All Doctors</h2>

<div id="doctorContainer" class="row mt-4"></div>


</div>


</div>

<script>

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

</script>



<!-- SUPABASE SCRIPT -->

<script type="module">

import { supabase } from "./js/supabase.js";


/* LOAD DOCTORS */



async function loadDoctors(){

const { data, error } = await supabase
.from("doctors")
.select("*")

if(error){
console.log(error)
return
}

const container = document.getElementById("doctorContainer")
container.innerHTML=""

if(data){
data.forEach(doc=>{

container.innerHTML += `

<div class="col-md-4 mb-4">

<div class="card doctor-card p-3">

<img src="${doc.photo}" class="doctor-img">

<div>

<h5 class="mt-2">${doc.name}</h5>

<p class="text-muted mb-1">${doc.specialization}</p>
<p class="text-muted mb-1">${doc.email}</p>

<p class="mb-1">Experience : ${doc.experience}</p>

<p>Fees : ₹${doc.fees}</p>

</div>

<div class="card-buttons">
<button class="btn btn-warning btn-sm"
onclick="editDoctor('${doc.id}')">
Edit Profile
</button>

<button class="btn btn-info btn-sm"
onclick="manageSlots('${doc.id}')">
Manage Slots
</button>

<button class="btn btn-danger btn-sm"
onclick="deleteDoctor('${doc.id}')">
Delete Profile
</button>

</div>

</div>

</div>

`

})
}

}loadDoctors()

/* ADD DOCTOR */

document.getElementById("addDoctorBtn").addEventListener("click", async()=>{

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let spec=document.getElementById("spec").value
let exp=document.getElementById("exp").value
let fees=document.getElementById("fees").value

let file=document.getElementById("photo").files[0]

if(!name || !email || !spec || !exp || !fees || !file){

alert("Fill all fields")
return

}



/* IMAGE UPLOAD */

let fileName = Date.now() + "_" + file.name;

let { error: uploadError } = await supabase.storage
.from("doctors")
.upload("profiles/" + fileName, file);

if(uploadError){
console.log(uploadError)
alert("Image upload failed")
return
}

/* GET PUBLIC URL */

let { data:urlData } = supabase.storage
.from("doctors")
.getPublicUrl("profiles/" + fileName);

let imageURL = urlData.publicUrl;
/* INSERT DOCTOR */

let {error}=await supabase
.from("doctors")
.insert([{

name:name,
email:email,
specialization:spec,
experience:exp,
fees:fees,
photo:imageURL

}])


if(error){

alert("Doctor add failed")
console.log(error)
return

}

alert("Doctor Added Successfully")

location.reload()

})
/* FETCHING EXISTING DATA OF DOCTORS FOR EDITING */

let doctorId = null;

window.editDoctor = async function(id){

doctorId = id;

showPage("editprofile");

const { data } = await supabase
.from("doctors")
.select("*")
.eq("id", id)
.single()

document.getElementById("editName").value = data.name
document.getElementById("editMail").value = data.email
document.getElementById("editSpec").value = data.specialization
document.getElementById("editExp").value = data.experience
document.getElementById("editFees").value = data.fees
document.getElementById("editImg").value = data.photo

}


/* UPDATE OR EDIT DOCTOR */

window.updateDoctor = async function(){

const name = document.getElementById("editName").value
const email = document.getElementById("editMail").value
const specialization = document.getElementById("editSpec").value
const experience = document.getElementById("editExp").value
const fees = document.getElementById("editFees").value
const photo = document.getElementById("editImg").value

const { error } = await supabase
.from("doctors")
.update({
name:name,
email:email,
specialization:specialization,
experience:experience,
fees:fees,
photo:photo
})
.eq("id", doctorId)

if(error){
alert("Update failed")
return
}

alert("Profile updated successfully")

showPage("doctorList")

loadDoctors()

}
/* DELETE DOCTOR */
window.deleteDoctor = async function(id){

if(!confirm("Are you sure you want to delete this doctor?")) return

const { error } = await supabase
.from("doctors")
.delete()
.eq("id", id)

if(error){
alert("Delete failed")
return
}

alert("Doctor deleted successfully")

loadDoctors()

}
</script>


</body>
</html>
