<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediSphere Doctor Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: #f5f7fa;
            font-family: "Segoe UI", sans-serif;
        }

        .sidebar {
            height: 100vh;
            width: 230px;
            background: #1d2b53;
            color: white;
            position: fixed;
            padding-top: 30px;
        }

        .sidebar h3 {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            color: #ddd;
            transition: 0.3s;
        }

        .menu-item:hover {
            background: #111d40;
            color: white;
        }

        .content {
            margin-left: 250px;
            padding: 40px;
        }

        .page {
            display: none;
        }

        .active-page {
            display: block;
        }

        .card {
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
        }

        .slot-pill {
            background: #1d2b53;
            padding: 8px 14px;
            border-radius: 20px;
            color: white;
            display: inline-block;
            margin: 5px;
        }

        .removeSlot {
            cursor: pointer;
            margin-left: 8px;
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h3>MediSphere Admin</h3>

        <div class="menu-item" onclick="showPage('addDoctorPage')">➕ Add Doctor</div>
        <div class="menu-item" onclick="showPage('slotsPage')">📅 Appointment Slots</div>
        <div class="menu-item" onclick="showPage('profilePage')">⚙ Edit Doctor Profile</div>
        <div class="menu-item" onclick="showPage('doctorListPage')">👨‍⚕️ Doctors List</div>
    </div>

    <div class="content">

        <!-- ADD DOCTOR -->
        <div id="addDoctorPage" class="page active-page">
            <h2>Add New Doctor</h2>
            <div class="card mt-3">

                <label>Name:</label>
                <input id="name" class="form-control mb-2">

                <label>Email (Gmail):</label>
                <input id="email" type="email" class="form-control mb-2" >

                <label>Specialization:</label>
                <input id="specialization" class="form-control mb-2">

                <label>Experience (Years):</label>
                <input id="experience" class="form-control mb-2">

                <label>Fees:</label>
                <input id="fees" class="form-control mb-2">

                <label>Upload Profile Image:</label>
                <input type="file" id="imageFile" accept="image/*" class="form-control mb-3">

                <button id="saveBtn" class="btn btn-primary w-100">Save Doctor</button>
            </div>
        </div>

        <!-- SLOT PAGE -->
        <div id="slotsPage" class="page">
            <h2>Manage Doctor Slots</h2>

            <div class="card mt-3">
                <h5 id="slotDoctorName"></h5>

                <label>Select Date:</label>
                <input type="date" id="slotDate" class="form-control mb-3">

                <label>Add Time Slot:</label>
                <input type="time" id="slotTime" class="form-control mb-3">

                <button onclick="addSlot()" class="btn btn-dark w-100 mb-3">Add Slot</button>

                <h5>Current Slots:</h5>
                <div id="slotContainer"></div>

                <button onclick="saveSlots()" class="btn btn-success w-100 mt-3">Save Slots</button>
            </div>
        </div>

        <!-- PROFILE EDIT -->
        <div id="profilePage" class="page">
            <h2>Edit Doctor Profile</h2>

            <div class="card mt-3">
                <label>Name:</label>
                <input id="editName" class="form-control mb-2">
       
                 <label>Email</label>
                <input id="editMail" class="form-control mb-2">

                <label>Specialisation:</label>
                <input id="editSpec" class="form-control mb-2">

                <label>Experience:</label>
                <input id="editExp" class="form-control mb-2">

                <label>Fees:</label>
                <input id="editFees" class="form-control mb-2">

                <label>Image URL:</label>
                <input id="editImg" class="form-control mb-2">

                <button onclick="updateDoctor()" class="btn btn-primary w-100 mt-3">Update Profile</button>
            </div>
        </div>

        <!-- DOCTOR LIST -->
        <!-- <div id="doctorListPage" class="page">
            <h2>All Doctors</h2>
            <div id="doctorsContainer" class="row mt-4"></div>
        </div>

    </div>

<script>
function showPage(id) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
    document.getElementById(id).classList.add("active-page");
}
</script> -->
<script>
async function loadDoctors() {
    const { data, error } = await supabase
        .from("doctors")
        .select("*");

    console.log("Doctors:", data);

    const container = document.getElementById("doctorsContainer");
    container.innerHTML = "";

    data.forEach(doc => {
        container.innerHTML += `
            <div class="col-md-4">
                <div class="card p-3">
                    <img src="${doc.photo}" class="img-fluid rounded">
                    <h4>${doc.name}</h4>
                    <p>${doc.specialization}</p>
                    <p>Experience: ${doc.experience}</p>
                    <p>Fees: ₹${doc.fees}</p>
                </div>
            </div>
        `;
    });
}
</script>
<!-- FIREBASE ADD DOCTOR -->

<script type="module">
import { db } from "./js/firebase.js";
import { supabase } from "./js/supabase.js";
import { collection, addDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


document.getElementById("saveBtn").addEventListener("click", async function () {

    let nameVal = document.getElementById("name").value;
    let mailVal = document.getElementById("email").value;
    let specVal = document.getElementById("specialization").value;
    let expVal = document.getElementById("experience").value;
    let feesVal = document.getElementById("fees").value;

    let file = document.getElementById("imageFile").files[0]; // IMAGE FILE INPUT

    if (!nameVal || !specVal || !expVal || !feesVal || !mailVal) {
        alert("Please fill all fields");
        return;
    }

    if (!file) {
        alert("Please upload profile image!");
        return;
    }

    // 🔥 Upload image to Firebase Storage
//         await uploadBytes(storageRef, file);
// const storageRef = ref(storage, "doctorImages/" + Date.now() + "_" + file.name);

    // 🔥 Get image download URL
    // let imageURL = await getDownloadURL(storageRef);
    // Upload to Supabase Storage
const fileName = `${Date.now()}_${file.name}`;

const { data, error } = await supabase.storage
  .from("doctors")
  .upload(fileName, file);

if (error) {
    alert("Image upload failed!");
    console.log(error);
    return;
}

// Get public image URL
const { data: urlData } = supabase.storage
  .from("doctors")
  .getPublicUrl(fileName);

let imageURL = urlData.publicUrl;

    // 🔥 Save doctor details in Firestore
    await addDoc(collection(db, "doctorsprofile"), {
        name: nameVal,
        email: mailVal,
        specialization: specVal,
        experience: expVal,
        fees: feesVal,
        image: imageURL,  // uploaded image URL
        slots: []
    });

    alert("Doctor added successfully!");
    location.reload(); // refresh doctor list
});
</script>

</body>
</html>
