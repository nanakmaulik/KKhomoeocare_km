<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e9eef5;
    font-family: "Inter", sans-serif;
}

/* ====== PRO CARD ====== */
.card-pro {
    width: 460px;
    padding: 40px 35px;
    border-radius: 22px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(16px);
    border: 1px solid #d4d9e2;
    box-shadow: 0 6px 22px rgba(0,0,0,0.07);
}

.card-pro h3 {
    font-weight: 700;
    font-size: 26px;
    text-align: center;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #6b7688;
    margin-top: -6px;
    margin-bottom: 25px;
}

/* INPUTS */
.form-control-pro {
    width: 100%;
    height: 50px;
    border-radius: 12px;
    border: 1.6px solid #cdd4df;
    background: #f7f9fc;
    padding-left: 14px;
    font-size: 15px;
}

.form-control-pro:focus {
    border-color: #2879ff;
    background: #fff;
    box-shadow: 0 0 0 4px rgba(40,121,255,0.18);
}

/* EYE ICON */
.eye-btn {
    position: absolute;
    right: 14px;
    top: 14px;
    cursor: pointer;
}

/* BUTTON */
.btn-pro {
    width: 100%;
    height: 52px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #2879ff, #1c5ec9);
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    margin-top: 10px;
}

#msg {
    font-size: 14px;
    text-align: center;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="card-pro">

    <h3>Create Admin Account</h3>
    <p class="subtitle">Enter your details to register</p>

    <form id="adminRegisterForm">

        <label>Full Name</label>
        <input type="text" id="name" class="form-control-pro mb-3" required>

        <label>Email Address</label>
        <input type="email" id="email" class="form-control-pro mb-3" required>

        <label>Password</label>
        <div class="input-group-pro mb-3" style="position:relative;">
            <input type="password" id="password" class="form-control-pro" required>
            <span class="eye-btn" onclick="togglePassword('password', this)">👁️</span>
        </div>

        <label>Confirm Password</label>
        <div class="input-group-pro mb-2" style="position:relative;">
            <input type="password" id="confirmPassword" class="form-control-pro" required>
            <span class="eye-btn" onclick="togglePassword('confirmPassword', this)">👁️</span>
        </div>

        <p id="msg"></p>

        <button class="btn-pro" type="submit">Register</button>

        <div class="link-pro text-center mt-3">
            Already have an account? <a href="admin-login.html">Login</a>
        </div>

    </form>

</div>

<!-- SUPABASE JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// Correct v2 syntax
const { createClient } = supabase;

const client = createClient(
    "https://vwvskyxthnwscelhxvma.supabase.co",
    "sb_publishable_qcwlJ1XOB6bgxv0uvAIOVQ_8U5edIux"
);

// 🔥 PASSWORD TOGGLE
function togglePassword(id, icon){
    const field = document.getElementById(id);
    if(field.type === "password"){
        field.type = "text";
        icon.textContent = "🙈";
    } else {
        field.type = "password";
        icon.textContent = "👁️";
    }
}

// 🔥 FORM SUBMIT
document.getElementById("adminRegisterForm").addEventListener("submit", async (e)=>{

    e.preventDefault();

    const nameVal = document.getElementById("name").value.trim();
    const emailVal = document.getElementById("email").value.trim();
    const passVal = document.getElementById("password").value.trim();
    const confirmVal = document.getElementById("confirmPassword").value.trim();
    const msg = document.getElementById("msg");

    msg.textContent = "";

    if(passVal !== confirmVal){
        msg.style.color = "red";
        msg.textContent = "Passwords do not match!";
        return;
    }

    msg.style.color = "#2879ff";
    msg.textContent = "Registering...";

    // 🔥 INSERT INTO SUPABASE
    let { data, error } = await client
        .from("admins")
        .insert([{ name: nameVal, email: emailVal, password: passVal }]);

    if(error){
        msg.style.color = "red";
        msg.textContent = error.message;
        return;
    }

    // SUCCESS POPUP
    alert("🎉 Registration Successful!");

    // REDIRECT AFTER POPUP
    window.location.href = "admin_login.html";
});

</script>

</body>
</html>
