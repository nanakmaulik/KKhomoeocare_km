    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Book Appointment – MediSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
    body{
        background:#f7f9fc;
        font-family: "Segoe UI", sans-serif;
    }
    .main-wrapper{
        max-width:1250px;
        margin:auto;
        margin-top:30px;
        display:flex;
        gap:35px;
    }

    /* LEFT DOCTOR CARD */
    .doctor-card{
        flex:1.3;
        background:#fff;
        padding:30px;
        border-radius:16px;
        box-shadow:0 3px 18px rgba(0,0,0,0.08);
    }
    .doctor-header{
        display:flex;
        gap:20px;
    }
    .doctor-img{
        width:140px;
        height:140px;
        border-radius:12px;
        object-fit:cover;
    }
    .doctor-name{
        font-size:27px;
        font-weight:700;
    }
    .doctor-special{
        font-size:18px;
        color:#555;
    }
    .detail-item{
        margin-top:8px;
        font-size:15px;
    }
    .detail-item i{
        color:#2e7bff;
        margin-right:8px;
    }

    /* RIGHT SLOT CARD */
    .slot-card{
        flex:1;
        background:#fff;
        padding:25px;
        border-radius:16px;
        box-shadow:0 3px 18px rgba(0,0,0,0.08);
    }
    .date-scroll{
        display:flex;
        overflow-x:auto;
        gap:10px;
        padding-bottom:10px;
    }
    .date-btn{
        min-width:80px;
        padding:12px 0;
        background:#f0f4ff;
        border-radius:10px;
        border:none;
        font-weight:600;
        text-align:center;
    }
    .date-btn.active{
        background:#0066ff;
        color:#fff;
    }
    .time-grid{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:12px;
    }
    .time-slot{
        padding:12px;
        border-radius:10px;
        background:#f4f7ff;
        border:1px solid #d8e1ff;
        text-align:center;
        cursor:pointer;
    }
    .time-slot.active{
        background:#0066ff;
        color:#fff;
        border:none;
    }
    .confirm-btn{
        width:100%;
        padding:14px;
        margin-top:20px;
        background:#0066ff;
        color:#fff;
        border:none;
        border-radius:10px;
        font-size:17px;
        font-weight:600;
    }
    .disabled-slot {
        pointer-events: none;
        opacity: 0.5;
    }

    </style>
    </head>

    <body>

    <h2 class="text-center mt-4 fw-bold">Book Appointment</h2>

    <div class="main-wrapper">

        <!-- LEFT DOCTOR DETAILS -->
        <div class="doctor-card" id="doctorCard">
            Loading doctor details...
        </div>

        <!-- RIGHT SLOT SECTION -->
        <div class="slot-card">
            <h4 class="mt-3">Patient Details</h4>

    <input 
    type="text"
    id="patientName"
    class="form-control mb-2"
    placeholder="Full Name"
    required
    >

    <input 
    type="email"
    id="patientEmail"
    class="form-control mb-2"
    placeholder="Email"
    required
    >

    <input 
    type="tel"
    id="patientPhone"
    class="form-control mb-3"
    placeholder="Phone Number"
    required
    >
            <h4>Available Slots</h4>

            <div id="feeBox" class="mt-2 fs-4 fw-bold"></div>

            <h5 class="mt-3">Select Date</h5>
            <div class="date-scroll" id="dateContainer"></div>

            <h5 class="mt-3">Select Time</h5>
            <div class="time-grid" id="slotContainer"></div>

        <button class="confirm-btn" id="confirmBtn">
    Confirm Appointment
    </button>
        </div>

    </div>


    <script type="module">
    import { supabase } from "./js/supabase.js";

    const params = new URLSearchParams(window.location.search);
    const doctorId = params.get("doctor");

    let selectedDate = null;
    let selectedSlot = null;

    /* ELEMENTS */
    const doctorCard = document.getElementById("doctorCard");
    const dateContainer = document.getElementById("dateContainer");
    const slotContainer = document.getElementById("slotContainer");
    const feeBox = document.getElementById("feeBox");

    /* STEP 1 — LOAD DOCTOR DETAILS */
    async function loadDoctor(){
        const { data, error } = await supabase
            .from("doctors")
            .select("*")
            .eq("id", doctorId)
            .single();

        if(error){ 
            doctorCard.innerHTML = "Error loading doctor";
            return;
        }

        doctorCard.innerHTML = `
    <div class="doctor-header">
        <img src="${data.photo}" class="doctor-img">
        <div>
            <div class="doctor-name">${data.name}</div>
            <div class="doctor-special">${data.specialization}</div>
            <div class="text-muted">${data.experience} years experience</div>
        </div>
    </div>

    <div class="detail-item mt-3">
        <i class="bi bi-envelope"></i> ${data.email}
    </div>

    <div class="detail-item">
        <i class="bi bi-cash"></i> ₹${data.fees}
    </div>

    <!-- ⭐ About Section -->
    <hr class="mt-4">
    <h4 class="mt-2 fw-bold">About Doctor</h4>
    <p class="mt-2" style="font-size:15px; line-height:22px; color:#444;">
        ${data.about || "No details available."}
    </p>
`;
        loadSlots();
    }

    /* STEP 2 — LOAD SLOTS FOR THIS DOCTOR */
    async function loadSlots(){

        const { data: slots, error } = await supabase
            .from("slots")
            .select("*")
            .eq("doctor_id", doctorId);

        if(error){
            dateContainer.innerHTML = "Error loading slots";
            return;
        }

        dateContainer.innerHTML = "";
        slotContainer.innerHTML = "";

        // GROUP SLOTS BY DATE
        const groupedDates = {};
        slots.forEach(s => {
            if(!groupedDates[s.slot_date]) groupedDates[s.slot_date] = [];
            groupedDates[s.slot_date].push(s);
        });

        // CREATE DATE BUTTONS
        Object.keys(groupedDates).forEach((date, index)=>{

            dateContainer.innerHTML += `
            <button class="date-btn ${index===0?'active':''}" data-date="${date}">
                ${formatDate(date)}
            </button>
            `;

            if(index===0) selectedDate = date;
        });

        // LOAD FIRST DATE SLOTS
        loadTimeSlots(groupedDates[selectedDate]);

        // DATE CLICK EVENTS
        document.querySelectorAll(".date-btn").forEach(btn=>{
            btn.addEventListener("click", ()=>{
                document.querySelectorAll(".date-btn").forEach(b=>b.classList.remove("active"));
                btn.classList.add("active");

                selectedDate = btn.dataset.date;
                loadTimeSlots(groupedDates[selectedDate]);
            });
        });

    }
        
    /* STEP 3 — LOAD TIME SLOTS */
    function loadTimeSlots(slots){
        slotContainer.innerHTML = "";
        selectedSlot = null;

        slots.forEach(slot=>{
            let div = document.createElement("div");
            div.textContent = slot.slot_time;
            div.dataset.slotId = slot.id;

            // If slot already booked → disable it
            if(slot.is_booked){
                div.classList.add("time-slot", "disabled-slot");
                div.style.background = "#ddd";
                div.style.color = "#888";
                div.style.cursor = "not-allowed";
                div.style.border = "1px solid #ccc";
            } 
            else {
                div.classList.add("time-slot");

                div.onclick = ()=>{
                    document.querySelectorAll(".time-slot").forEach(s=>s.classList.remove("active"));
                    div.classList.add("active");
                    selectedSlot = slot.id;
                };
            }

            slotContainer.appendChild(div);
        });
    }

    /* FORMAT DATE LIKE "12 Mar" */
    function formatDate(dateStr){
        const d = new Date(dateStr);
        return d.toLocaleDateString("en-GB",{ day:"2-digit", month:"short" });
    }



   
    loadDoctor();
    document.getElementById("confirmBtn").addEventListener("click", () => {
    console.log("BUTTON CLICKED");
    bookAppointment(); // ✅ THIS IS IMPORTANT
    });

    async function bookAppointment(){

    console.log("API CALL STARTED");

    const patientname = document.getElementById("patientName").value;
    const email = document.getElementById("patientEmail").value;
    const phone = document.getElementById("patientPhone").value;

    if(!patientname || !email || !phone){
    alert("Please fill patient details");
    return;
    }

    if(!selectedSlot){
    alert("Please select a slot");
    return;
    }

    const appointmentdate = selectedDate;
    const appointmenttime = document.querySelector(".time-slot.active").textContent;

    try{

    const response = await fetch("http://localhost:5000/book-video-appointment",{
    method:"POST",
    headers:{
    "Content-Type":"application/json"
    },
    body:JSON.stringify({
    patientname,
    email,
    phone,
    appointmentdate,
    appointmenttime,
    doctor_id: doctorId,
    slot_id: selectedSlot
    })
    });

    const data = await response.json();

    console.log(data);

    if(data.success){

    alert("Appointment Confirmed!\nMeet Link: "+data.meet_link);

    window.location.href="appointmentsuccess.html";

    }else{

    alert("Error booking appointment");

    }

    }catch(error){

    console.error(error);
    alert("Server error");

    }

    }



    </script>

    </body>
    </html>
