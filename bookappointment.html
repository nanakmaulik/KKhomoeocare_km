    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Book Appointment – MediSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
    body{
        background:#f7f9fc;
        font-family: "Segoe UI", sans-serif;
    }
    .main-wrapper{
        max-width:1250px;
        margin:auto;
        margin-top:30px;
        display:flex;
        gap:35px;
    }

    /* LEFT DOCTOR CARD */
    /* LEFT DOCTOR CARD (PROFESSIONAL) */
.doctor-card{
    flex:1.3;
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0px 8px 25px rgba(0,0,0,0.08);
}

.doctor-header{
    display:flex;
    gap:18px;
    align-items:center;
    padding-bottom:15px;
    border-bottom:1px solid #eee;
}

.doctor-img{
    width:95px;
    height:95px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #0066ff;
    box-shadow:0px 4px 15px rgba(0,102,255,0.25);
}

.doctor-name{
    font-size:26px;
    font-weight:850;
    margin:0;
    color:#111;
}

.doctor-special{
    font-size:16px;
    font-weight:700;
    color:#0066ff;
    background:rgba(0,102,255,0.1);
    padding:5px 12px;
    border-radius:20px;
    display:inline-block;
    margin-top:6px;
}

.doctor-exp{
    margin-top:8px;
    font-size:16px;
    color:#555;
    font-weight: 600;
}

.doctor-stats{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-top:18px;
}

.stat-box{
    flex:1;
    background:#f7f9ff;
    border-radius:14px;
    padding:12px;
    text-align:center;
    border:1px solid #e3e9ff;
}

.stat-title{
    margin:0;
    font-size:14px;
    color:#777;
    font-weight:700;
}

.stat-value{
    margin:4px 0 0;
    font-size:19px;
    font-weight:900;
    color:#0066ff;
}

.doctor-contact{
    margin-top:16px;
    font-size:16px;
    font-weight: 600;
    color:#444;
}

.doctor-contact i{
    color:#0066ff;
    margin-right:8px;
}

.doctor-about{
    margin-top:18px;
    padding:15px;
    border-radius:14px;
    background:#f9fafc;
    border:1px solid #eee;
}

.doctor-about h4{
    margin:0 0 10px;
    font-size:18px;
    font-weight:900;
    color:#111;
}

.doctor-about p{
    margin:0;
    font-size:16px;
    color:#555;
    line-height:1.7;
}
.doctor-email{
    text-decoration: none;
    color: #0066ff;
    font-weight: 700;
}

.doctor-email:hover{
    text-decoration: underline;
    color: #0047b3;
}

    /* RIGHT SLOT CARD */
    .slot-card{
        flex:1;
        background:#fff;
        padding:25px;
        border-radius:16px;
        box-shadow:0 3px 18px rgba(0,0,0,0.08);
    }
    .date-scroll{
        display:flex;
        overflow-x:auto;
        gap:10px;
        padding-bottom:10px;
    }
    .date-btn{
        min-width:80px;
        padding:12px 0;
        background:#f0f4ff;
        border-radius:10px;
        border:none;
        font-weight:600;
        text-align:center;
    }
    .date-btn.active{
        background:#0066ff;
        color:#fff;
    }
    .time-grid{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:12px;
    }
    .time-slot{
        padding:12px;
        border-radius:10px;
        background:#f4f7ff;
        border:1px solid #d8e1ff;
        text-align:center;
        cursor:pointer;
    }
    .time-slot.active{
        background:#0066ff;
        color:#fff;
        border:none;
    }
    .confirm-btn{
        width:100%;
        padding:14px;
        margin-top:20px;
        background:#0066ff;
        color:#fff;
        border:none;
        border-radius:10px;
        font-size:17px;
        font-weight:600;
    }
    .disabled-slot {
        pointer-events: none;
        opacity: 0.5;
    }
    /* PROFESSIONAL APPOINTMENT TYPE BUTTONS */
.appointment-type-box {
    display: flex;
    gap: 12px;
    background: #f5f8ff;
    padding: 10px;
    border-radius: 14px;
    border: 1px solid #dfe8ff;
}

.appointment-type-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;

    padding: 14px 12px;
    border-radius: 12px;
    cursor: pointer;

    font-weight: 600;
    font-size: 15px;
    color: #1d2b53;

    background: white;
    border: 1px solid #d6e2ff;

    transition: 0.25s ease-in-out;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.appointment-type-btn i {
    font-size: 18px;
    color: #0066ff;
}

.appointment-type-btn:hover {
    transform: translateY(-2px);
    border-color: #0066ff;
    box-shadow: 0 6px 14px rgba(0,102,255,0.18);
}

/* ACTIVE SELECTED BUTTON */
.btn-check:checked + .appointment-type-btn {
    background: linear-gradient(135deg, #0066ff, #0047b3);
    color: white;
    border: none;
    box-shadow: 0 8px 18px rgba(0,102,255,0.35);
}

.btn-check:checked + .appointment-type-btn i {
    color: white;
}
/* PROFESSIONAL INPUT FIELDS */
.input-box {
    display: flex;
    align-items: center;
    gap: 12px;

    background: #f5f8ff;
    border: 1px solid #dfe8ff;
    border-radius: 14px;

    padding: 12px 14px;
    margin-bottom: 14px;

    transition: 0.25s ease-in-out;
}

.input-box i {
    font-size: 18px;
    color: #0066ff;
}

.custom-input {
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    font-size: 15px;
    font-weight: 500;
    color: #1d2b53;
}

.custom-input::placeholder {
    color: #7a8bb5;
    font-weight: 500;
}

/* Hover effect */
.input-box:hover {
    border-color: #0066ff;
    box-shadow: 0 6px 16px rgba(0,102,255,0.12);
}

/* Focus effect */
.input-box:focus-within {
    border-color: #0066ff;
    box-shadow: 0 8px 18px rgba(0,102,255,0.20);
    background: white;
}
.no-slot-msg{
    background: #fff3cd;
    border: 1px solid #ffeeba;
    color: #856404;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.06);
}

.no-slot-msg i{
    margin-right: 8px;
    font-size: 18px;
    color: #ff9800;
}

    </style>
    </head>

    <body>

    <h2 class="text-center mt-4 fw-bold">Book Appointment</h2>

    <div class="main-wrapper">

        <!-- LEFT DOCTOR DETAILS -->
        <div class="doctor-card" id="doctorCard">
            Loading doctor details...
        </div>

        <!-- RIGHT SLOT SECTION -->
        <div class="slot-card">
            <h4 class="mt-3">Patient Details</h4>

    <div class="input-box">
  <i class="bi bi-person-fill"></i>
  <input 
    type="text"
    id="patientName"
    class="custom-input"
    placeholder="Full Name"
    required
  >
</div>

<div class="input-box">
  <i class="bi bi-envelope-fill"></i>
  <input 
    type="email"
    id="patientEmail"
    class="custom-input"
    placeholder="Email Address"
    required
  >
</div>

<div class="input-box">
  <i class="bi bi-telephone-fill"></i>
  <input 
    type="tel"
    id="patientPhone"
    class="custom-input"
    placeholder="Phone Number"
    required
  >
</div>
    <label class="fw-bold mt-2 mb-2">Appointment Type</label>

<div class="appointment-type-box mb-3">

  <input type="radio" class="btn-check" name="appointmentType" id="offlineBtn" value="offline" checked>
  <label class="appointment-type-btn" for="offlineBtn">
    <i class="bi bi-hospital"></i>
    <span>Offline Visit</span>
  </label>

  <input type="radio" class="btn-check" name="appointmentType" id="onlineBtn" value="online">
  <label class="appointment-type-btn" for="onlineBtn">
    <i class="bi bi-camera-video-fill"></i>
    <span>Online Meet</span>
  </label>

</div>


            <h4>Available Slots</h4>

            <div id="feeBox" class="mt-2 fs-4 fw-bold"></div>

            <h5 class="mt-3">Select Date</h5>
            <div class="date-scroll" id="dateContainer"></div>

            <h5 class="mt-3">Select Time</h5>
            <div class="time-grid" id="slotContainer"></div>

        <button class="confirm-btn" id="confirmBtn">
    Confirm Appointment
    </button>
        </div>

    </div>


    <script type="module">
    import { supabase } from "./js/supabase.js";

    const params = new URLSearchParams(window.location.search);
    const doctorId = params.get("doctor");

    let selectedDate = null;
    let selectedSlot = null;

    /* ELEMENTS */
    const doctorCard = document.getElementById("doctorCard");
    const dateContainer = document.getElementById("dateContainer");
    const slotContainer = document.getElementById("slotContainer");
    const feeBox = document.getElementById("feeBox");

    /* STEP 1 — LOAD DOCTOR DETAILS */
    async function loadDoctor(){
        const { data, error } = await supabase
            .from("doctors")
            .select("*")
            .eq("id", doctorId)
            .single();

        if(error){ 
            doctorCard.innerHTML = "Error loading doctor";
            return;
        }

        doctorCard.innerHTML = `
  <div class="doctor-header">
      <img src="${data.photo || 'https://cdn-icons-png.flaticon.com/512/387/387561.png'}" class="doctor-img">

      <div>
          <div class="doctor-name">${data.name}</div>

          <div class="doctor-special">
            ${data.specialization}
          </div>

          <div class="doctor-exp">
            <i class="bi bi-briefcase-fill text-primary"></i>
            ${data.experience} years experience
          </div>
      </div>
  </div>

  <div class="doctor-stats">
      <div class="stat-box">
          <p class="stat-title">Consultation Fee</p>
          <p class="stat-value">₹${data.fees}</p>
      </div>

      <div class="stat-box">
    <p class="stat-title">Rating</p>
    <p class="stat-value">⭐ ${data.rating || "N/A"}</p>
</div>

<div class="stat-box">
    <p class="stat-title">Patients</p>
    <p class="stat-value">${data.patients || 0}+</p>
</div>
  </div>

  <div class="doctor-contact">
    <p>
  <i class="bi bi-envelope-fill"></i>
  <a href="https://mail.google.com/mail/?view=cm&fs=1&to=${data.email}" 
     target="_blank" 
     class="doctor-email">
     ${data.email}
  </a>
</p>
  </div>

  <div class="doctor-about">
      <h4>About Doctor</h4>
      <p>${data.about || "This doctor is experienced in providing high-quality consultation and patient care."}</p>
  </div>
`;
        loadSlots();
    }

    /* STEP 2 — LOAD SLOTS FOR THIS DOCTOR */
    async function loadSlots(){

        const { data: slots, error } = await supabase
            .from("slots")
            .select("*")
            .eq("doctor_id", doctorId);

        if(error){
            dateContainer.innerHTML = "Error loading slots";
            return;
        }

        dateContainer.innerHTML = "";
        slotContainer.innerHTML = "";

        
       
       // GROUP SLOTS BY DATE (ONLY TODAY + FUTURE)
const groupedDates = {};

const today = new Date();
today.setHours(0,0,0,0);

slots.forEach(s => {

    const slotDate = new Date(s.slot_date);
    slotDate.setHours(0,0,0,0);

    // ❌ Skip past dates automatically
    if(slotDate < today) return;

    if(!groupedDates[s.slot_date]) groupedDates[s.slot_date] = [];
    groupedDates[s.slot_date].push(s);
});

// ✅ If no future slots exist
if(Object.keys(groupedDates).length === 0){
    dateContainer.innerHTML = "<p class='text-danger'>No future slots available</p>";
    slotContainer.innerHTML = "";
    return;
}

      // CREATE DATE BUTTONS (SORTED)
const sortedDates = Object.keys(groupedDates)
  .sort((a, b) => new Date(a) - new Date(b));

sortedDates.forEach((date, index) => {

    dateContainer.innerHTML += `
    <button class="date-btn ${index===0?'active':''}" data-date="${date}">
        ${formatDate(date)}
    </button>
    `;

    if(index===0) selectedDate = date;
});

// LOAD FIRST DATE SLOTS
loadTimeSlots(groupedDates[selectedDate]);

// DATE CLICK EVENTS
document.querySelectorAll(".date-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
        document.querySelectorAll(".date-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        selectedDate = btn.dataset.date;
        loadTimeSlots(groupedDates[selectedDate]);
    });
});
 }
        
    /* STEP 3 — LOAD TIME SLOTS */
    function loadTimeSlots(slots){

    slotContainer.innerHTML = "";
    selectedSlot = null;

    const now = new Date();

    slots.forEach(slot => {

        // slot date
        const slotDateObj = new Date(selectedDate);
        slotDateObj.setHours(0,0,0,0);

        // today date
        const todayObj = new Date();
        todayObj.setHours(0,0,0,0);

        // slot time split
        const [hours, minutes] = slot.slot_time.split(":").map(Number);

        // full slot datetime
        const slotDateTime = new Date(selectedDate);
        slotDateTime.setHours(hours, minutes, 0, 0);

        // ❌ अगर date आज की है और time निकल चुका है तो skip
        if(slotDateObj.getTime() === todayObj.getTime() && slotDateTime < now){
            return;
        }

        let div = document.createElement("div");
        div.textContent = slot.slot_time;
        div.dataset.slotId = slot.id;

        // If slot already booked → disable it
        if(slot.is_booked){
            div.classList.add("time-slot", "disabled-slot");
            div.style.background = "#ddd";
            div.style.color = "#888";
            div.style.cursor = "not-allowed";
            div.style.border = "1px solid #ccc";
        } 
        else {
            div.classList.add("time-slot");

            div.onclick = ()=>{
                document.querySelectorAll(".time-slot").forEach(s=>s.classList.remove("active"));
                div.classList.add("active");
                selectedSlot = slot.id;
            };
        }

        slotContainer.appendChild(div);

    });

    // अगर सारे slots निकल चुके हैं
    if(slotContainer.innerHTML.trim() === ""){
        slotContainer.innerHTML = `
  <div class="no-slot-msg">
    <i class="bi bi-exclamation-triangle-fill"></i>
    No available time slots
  </div>
`;
    }
}
    /* FORMAT DATE LIKE "12 Mar" */
    function formatDate(dateStr){
        const d = new Date(dateStr);
        return d.toLocaleDateString("en-GB",{ day:"2-digit", month:"short" });
    }



   
    loadDoctor();
    document.getElementById("confirmBtn").addEventListener("click", () => {
    console.log("BUTTON CLICKED");
    bookAppointment(); // ✅ THIS IS IMPORTANT
    });

    async function bookAppointment(){

  console.log("API CALL STARTED");

  const patientname = document.getElementById("patientName").value;
  const email = document.getElementById("patientEmail").value;
  const phone = document.getElementById("patientPhone").value;
  const appointmentType = document.querySelector('input[name="appointmentType"]:checked').value;

  if(!patientname || !email || !phone){
    alert("Please fill patient details");
    return;
  }

  if(!selectedSlot){
    alert("Please select a slot");
    return;
  }

  const appointmentdate = selectedDate;
  const appointmenttime = document.querySelector(".time-slot.active").textContent;

  // ✅ Decide API based on appointment type
  const apiUrl =
    appointmentType === "online"
      ? "http://localhost:5000/book-online-appointment"
      : "http://localhost:5000/book-offline-appointment";

  try {

    const response = await fetch(apiUrl,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        patientname,
        email,
        phone,
        appointmentdate,
        appointmenttime,
        doctor_id: doctorId,
        slot_id: selectedSlot
      })
    });

    const data = await response.json();
    console.log("SERVER RESPONSE:", data);

    if(data.success){

      if(data.meet_link){
        alert("✅ Online Appointment Confirmed!\nMeet Link: " + data.meet_link);
      } else {
        alert("✅ Offline Appointment Confirmed!");
      }

      window.location.href = "appointmentsuccess.html";

    } else {
      alert(data.message || "Error booking appointment");
    }

  } catch(error){
    console.error(error);
    alert("Server error / Backend not running");
  }
}


    </script>

    </body>
    </html>
